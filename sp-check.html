<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SharePoint Custom Script Check</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Segoe UI, system-ui, sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 12px; padding: 32px; max-width: 480px; width: 100%; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  h2 { font-size: 18px; margin-bottom: 8px; }
  p { font-size: 13px; color: #666; margin-bottom: 20px; }
  button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 600; }
  .btn-check { background: #0078d4; color: #fff; }
  .btn-check:hover { background: #106ebe; }
  .btn-check:disabled { opacity: .5; cursor: not-allowed; }
  .result { margin-top: 16px; padding: 14px; border-radius: 8px; font-size: 14px; display: none; }
  .result.info { background: #deecf9; color: #005a9e; display: block; }
  .result.ok { background: #dff6dd; color: #1e5200; display: block; }
  .result.fail { background: #fde7e9; color: #a4262c; display: block; }
  pre { background: #fafafa; padding: 10px; border-radius: 6px; font-size: 11px; overflow-x: auto; margin-top: 8px; max-height: 200px; overflow-y: auto; }
</style>
</head>
<body>
<div class="card">
  <h2>InvoiceSite — Custom Script Status</h2>
  <p>Checks <code>DenyAddAndCustomizePages</code> on <code>luckybellhk.sharepoint.com/sites/InvoiceSite</code></p>
  <button id="checkBtn" class="btn-check" onclick="runCheck()">Check Now</button>
  <div id="result" class="result"></div>
</div>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<script>
const msalConfig = {
  auth: {
    clientId: "67ffc852-e5aa-4648-a19c-c2abbb370daa",
    authority: "https://login.microsoftonline.com/8f4e92f4-6d11-400d-8b90-3a63b659ccdc",
    redirectUri: window.location.origin + window.location.pathname
  }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);
const SP_SCOPES = ["https://luckybellhk.sharepoint.com/.default"];
const SITE_URL = "https://luckybellhk.sharepoint.com/sites/InvoiceSite";

async function runCheck() {
  const btn = document.getElementById("checkBtn");
  const result = document.getElementById("result");
  btn.disabled = true;
  btn.textContent = "Authenticating...";
  result.className = "result info";
  result.style.display = "block";
  result.innerHTML = "Requesting token...";

  let token;
  try {
    const resp = await msalInstance.acquireTokenSilent({ scopes: SP_SCOPES });
    token = resp.accessToken;
    result.innerHTML = "Token acquired (silent). Calling SharePoint REST API...";
  } catch (e) {
    result.innerHTML = "Silent auth failed, opening login popup...";
    try {
      const resp = await msalInstance.acquireTokenPopup({ scopes: SP_SCOPES });
      token = resp.accessToken;
      result.innerHTML = "Token acquired (popup). Calling SharePoint REST API...";
    } catch (e2) {
      result.className = "result fail";
      result.innerHTML = "<strong>Authentication failed</strong><br>" + e2.message;
      btn.disabled = false;
      btn.textContent = "Retry";
      return;
    }
  }

  try {
    const apiUrl = SITE_URL + "/_api/site/DenyAddAndCustomizePages";
    const r = await fetch(apiUrl, {
      headers: { "Authorization": "Bearer " + token, "Accept": "application/json" }
    });
    const body = await r.text();
    result.innerHTML = "<strong>SharePoint REST API Response</strong><br>HTTP " + r.status + "<pre>" + body.substring(0, 800).replace(/</g,"&lt;") + "</pre>";

    if (r.status === 200) {
      try {
        const j = JSON.parse(body);
        const val = j.d ? j.d.DenyAddAndCustomizePages : j.DenyAddAndCustomizePages;
        if (val === false || val === 0 || val === "false" || val === "0") {
          result.className = "result ok";
          result.innerHTML += "<br><strong>Custom Script is ENABLED</strong> — the site accepts inline scripts and HTML.";
        } else if (val === true || val === 1 || val === "true" || val === "1") {
          result.className = "result fail";
          result.innerHTML += "<br><strong>Custom Script is DISABLED</strong> — ask admin to enable it.";
        } else {
          result.innerHTML += "<br>Raw value: " + JSON.stringify(val);
        }
      } catch (e) {
        result.innerHTML += "<br>Could not parse JSON response.";
      }
    }
  } catch (e) {
    result.className = "result fail";
    result.innerHTML = "<strong>Request failed</strong><br>" + e.message;
  }

  btn.disabled = false;
  btn.textContent = "Check Again";
}
</script>
</body>
</html>
